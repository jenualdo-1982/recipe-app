version: "1"
meta:
  environment: python
  toolchain:
    name: pip
    version: "3.11"
build:
  requirementsPath: requirements.txt
  useCache: true
run:
  persistenceMount: /data
  # Указываем путь к приложению через точку: папка.файл:объект_fastapi
  command: uvicorn back.main:app --host 0.0.0.0 --port 80
