version: "1"
meta:
  environment: python
  toolchain:
    name: pip
    version: "3.11"
build:
  requirementsPath: requirements.txt
  useCache: true
run:
  persistenceMount: /data
  # Мы говорим uvicorn: зайди в пакет back, найди модуль main и в нем объект app
  command: uvicorn back.main:app --host 0.0.0.0 --port 80
